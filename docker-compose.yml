services:
  exulofra-db:
    image: postgres:16-alpine
    container_name: exulofra_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=exulofra_dev_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - exulofra-network

  api-service:
    container_name: exulofra_api_container
    ports:
      - "5164:80"
    depends_on:
      - exulofra-db
    networks:
      - exulofra-network

networks:
  exulofra-network:
    driver: bridge

volumes:
  pgdata:
